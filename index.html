        :root {
            /* Altere a cor do texto ALMEIDA aqui (ex: white, #FF0000) */

            /* Altere a cor do + aqui (ex: #3B82F6, red) */
            --logo-plus-color: #E54711;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        @keyframes marquee-left {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        @keyframes marquee-right {
            0% {
                transform: translateX(-50%);
            }

            100% {
                transform: translateX(0);
            }
        }

        .animate-marquee-left {
            display: flex;
            width: max-content;
            gap: 16px;
            animation: marquee-left 45s linear infinite;
            will-change: transform;
        }

        .animate-marquee-right {
            display: flex;
            width: max-content;
            gap: 16px;
            animation: marquee-right 45s linear infinite;
            will-change: transform;
        }

        .login-poster-strip {
            width: max-content;
            min-width: 220vw;
        }

        .catalog-fade-mask {
            mask-image: linear-gradient(90deg, transparent 0%, black 5%, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 5%, black 95%, transparent 100%);
        }

        .poster-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.18), rgba(139, 92, 246, 0.12));
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        }

        @media (prefers-reduced-motion: reduce) {

            .animate-marquee-left,
            .animate-marquee-right,
            .animate-float,
            .animate-pulse,
            .animate-ping {
                animation: none !important;
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(11, 15, 25, 0.5);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        body {
            background-color: #0B0F19;
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.04) 0px, transparent 50%),
                radial-gradient(at 50% 0%, rgba(139, 92, 246, 0.04) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.04) 0px, transparent 50%);
            background-attachment: fixed;
            color: #E2E8F0;
            overflow-x: hidden;
            font-family: 'Outfit', sans-serif;
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Custom iOS Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .3s;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #10B981;
        }

        input:checked+.slider:before {
            transform: translateX(16px);
        }
    </style>
</head>

            const [myList, setMyList] = useState(() => {

            // Video player simulation state
            const [isPlaying, setIsPlaying] = useState(false);

            const [loginMarqueePosters, setLoginMarqueePosters] = useState([]);

            const loginMarqueeItems = React.useMemo(() => {
                if (loginMarqueePosters.length > 0) return loginMarqueePosters;
                return Object.values(FALLBACK_MOVIES).flat()
                    .filter((m, idx, self) => self.findIndex(t => t.id === m.id) === idx && m.backdrop_path)
                    .slice(0, 80)
                    .map(m => ({ ...m, poster_path: m.backdrop_path }));
            }, [loginMarqueePosters]);

            const loginMarqueeRows = React.useMemo(() => {
                const n = loginMarqueeItems.length;
                if (n === 0) return [];
                const rows = [];
                for (let r = 0; r < 8; r++) {
                    const start = Math.min(r * 10, n - 16);
                    const end = Math.min(start + 16, n);
                    const chunk = loginMarqueeItems.slice(start, end);
                    rows.push([...chunk, ...chunk]);
                }
                return rows;
            }, [loginMarqueeItems]);

            // --- SYNCS ---
            useEffect(() => {
                if (window.supabase) {
                    window.supabase.getPlatforms()
                        .then(dbPlatforms => {
                            if (dbPlatforms && dbPlatforms.length > 0) {
                                setPlatforms(dbPlatforms);
                            }
                        })
                        .catch(e => console.error('Supabase load error', e));

                    window.supabase.getAllUsers()
                        .then(dbUsers => {
                            if (dbUsers && dbUsers.length > 0) {
                                setUsers(dbUsers);
                            }
                        })
                        .catch(e => console.error('Supabase users load error', e));
                }
            }, []);

                if (window.supabase && currentUser) {
                    window.supabase.getUserFavorites(currentUser.id)

                            if (favs) setMyList(favs.map(f => f.movie_id));

            }, [currentUser]);

            useEffect(() => {

            useEffect(() => {
                localStorage.setItem('ap_platforms', JSON.stringify(platforms));

            useEffect(() => {

            // --- SIMULATED PLAYBACK PROGRESS ---
            useEffect(() => {
                let interval;
                if (isPlaying) {
                    interval = setInterval(() => {
                        setPlaybackProgress(prev => {
                            const next = prev + 0.05;
                            if (next >= 100) {
                                setIsPlaying(false);
                                return 0;
                            }
                            const totalSeconds = 58 * 60 + 23;
                            const currentSeconds = Math.floor((next / 100) * totalSeconds);
                            const min = Math.floor(currentSeconds / 60);
                            const sec = currentSeconds % 60;
                            setPlaybackTime({
                                current: `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`,
                                total: '58:23'
                            });
                            return next;
                        });
                    }, 500);
                }
                return () => clearInterval(interval);
            }, [isPlaying]);

            // --- TMDB API DATA FETCHING ---
            useEffect(() => {
                if (currentRoute === 'login' || !currentUser) return;

                let cancelled = false;
                const clearCatalog = () => {
                    setMovies([]);
                    setMoviesPopular([]);
                    setMoviesTrending([]);
                    setMoviesAction([]);
                    setMoviesSciFi([]);
                    setMoviesComedy([]);
                    setMoviesDrama([]);
                    setMoviesFamily([]);
                    setMoviesHorror([]);
                    setHeroMovie(null);
                };

                const userHasAccess = activePlatformId === 'all' || currentUser.role === 'admin' || currentUser.platforms.includes(activePlatformId);
                if (!userHasAccess) {
                    clearCatalog();
                    return;
                }

                const uniqMovies = (list) => list.filter((m, idx, self) => self.findIndex(t => t.id === m.id) === idx);
                const formatMovie = (m) => {
                    const backdrop = m.backdrop_path
                        ? (m.backdrop_path.startsWith('http') ? m.backdrop_path : `https://image.tmdb.org/t/p/w1280${m.backdrop_path}`)
                        : 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?auto=format&fit=crop&q=80&w=1200';
                    const poster = m.poster_path
                        ? (m.poster_path.startsWith('http') ? m.poster_path : `https://image.tmdb.org/t/p/w500${m.poster_path}`)
                        : backdrop;

                    return {
                        ...m,
                        backdrop_path: backdrop,
                        poster_path: poster
                    };
                };

                const getFallback = () => {
                    if (activePlatformId === 'all') {
                        return uniqMovies(Object.values(FALLBACK_MOVIES).flat());
                    }
                    return FALLBACK_MOVIES[activePlatformId] || FALLBACK_MOVIES['119'] || [];
                };

                const getProviderIds = () => {
                    if (activePlatformId === 'all') {
                        return currentUser.role === 'admin'
                            ? platforms.filter(p => p.enabled).map(p => p.id)
                            : currentUser.platforms.filter(pid => platforms.some(p => p.id === pid && p.enabled));
                    }
                    return [activePlatformId];
                };

                const fetchJson = async (url) => {
                    const response = await fetch(url, { headers: { Authorization: `Bearer ${TMDB_BEARER_TOKEN}` } });
                    if (!response.ok) throw new Error('TMDB request failed');
                    return response.json();
                };

                const buildDiscoverUrl = (providerIdsStr, params = {}, page = 1) => {
                    const query = new URLSearchParams({
                        api_key: TMDB_API_KEY,
                        language: LANG,
                        watch_region: REGION,
                        with_watch_providers: providerIdsStr,
                        page: String(page),
                        ...params
                    });
                    return `https://api.themoviedb.org/3/discover/movie?${query.toString()}`;
                };

                const loadCatalog = async () => {
                    setIsLoadingMovies(true);

                    try {
                        if (searchQuery.trim()) {
                            const pages = [1, 2, 3];
                            const responses = await Promise.all(pages.map(page => {
                                const query = new URLSearchParams({
                                    api_key: TMDB_API_KEY,
                                    language: LANG,
                                    region: REGION,
                                    query: searchQuery.trim(),
                                    page: String(page)
                                });
                                return fetchJson(`https://api.themoviedb.org/3/search/movie?${query.toString()}`);
                            }));

                            const formatted = uniqMovies(
                                responses.flatMap(data => data.results || []).filter(m => m.backdrop_path || m.poster_path)
                            ).map(formatMovie);

                            if (!cancelled) {
                                setMovies(formatted);
                                setHeroMovie(formatted[0] || null);
                            }
                            return;
                        }

                        const providerIds = getProviderIds();
                        const providerIdsStr = providerIds.join('|');
                        if (!providerIdsStr) {
                            if (!cancelled) clearCatalog();
                            return;
                        }

                        const fetchSection = async (params = {}) => {
                            try {
                                const responses = await Promise.all([1, 2].map(page => fetchJson(buildDiscoverUrl(providerIdsStr, params, page))));
                                const results = uniqMovies(responses.flatMap(data => data.results || []).filter(m => m.backdrop_path || m.poster_path));
                                return (results.length ? results : getFallback()).map(formatMovie);
                            } catch (err) {
                                console.warn('Using local fallback:', err);
                                return getFallback().map(formatMovie);
                            }
                        };

                        const [pop, trend, act, sci, comedy, drama, family, horror] = await Promise.all([
                            fetchSection({ sort_by: 'popularity.desc' }),
                            fetchSection({ sort_by: 'vote_average.desc', 'vote_count.gte': '150' }),
                            fetchSection({ sort_by: 'popularity.desc', with_genres: '28' }),
                            fetchSection({ sort_by: 'popularity.desc', with_genres: '878|14' }),
                            fetchSection({ sort_by: 'popularity.desc', with_genres: '35' }),
                            fetchSection({ sort_by: 'popularity.desc', with_genres: '18' }),
                            fetchSection({ sort_by: 'popularity.desc', with_genres: '10751|16' }),
                            fetchSection({ sort_by: 'popularity.desc', with_genres: '27|9648' })
                        ]);

                        if (!cancelled) {
                            setMoviesPopular(pop);
                            setMoviesTrending(trend);
                            setMoviesAction(act);
                            setMoviesSciFi(sci);
                            setMoviesComedy(comedy);
                            setMoviesDrama(drama);
                            setMoviesFamily(family);
                            setMoviesHorror(horror);

                            const allCatalog = uniqMovies([...trend, ...pop, ...act, ...sci, ...comedy, ...drama, ...family, ...horror]);
                            setMovies(allCatalog);
                            setHeroMovie(allCatalog[0] || null);
                        }
                    } catch (err) {
                        console.error('Catalog loading failed:', err);
                        if (!cancelled) {
                            const fallback = getFallback().map(formatMovie);
                            setMovies(fallback);
                            setMoviesPopular(fallback);
                            setHeroMovie(fallback[0] || null);
                        }
                    } finally {
                        if (!cancelled) setIsLoadingMovies(false);
                    }
                };

                loadCatalog();

                return () => {
                    cancelled = true;
                };
            }, [activePlatformId, searchQuery, currentUser, currentRoute, platforms]);

            // --- LOGIN MARQUEE TMDB FETCH ---
            useEffect(() => {
                if (currentRoute !== 'login') return;

                let cancelled = false;

                const fetchMarqueePosters = async () => {
                    try {
                        const pages = [1, 2, 3, 4];
                        const responses = await Promise.all(pages.map(page =>
                            fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${TMDB_API_KEY}&language=pt-BR&page=${page}`, {
                                headers: { Authorization: `Bearer ${TMDB_BEARER_TOKEN}` }
                            }).then(r => { if (!r.ok) throw new Error('TMDB request failed'); return r.json(); })
                        ));

                        if (!cancelled) {
                            const all = responses.flatMap(d => d.results || []);
                            const seen = new Set();
                            const items = all
                                .filter(m => m.poster_path && (seen.has(m.id) ? false : seen.add(m.id)))
                                .slice(0, 80)
                                .map(m => ({
                                    ...m,
                                    poster_path: `https://image.tmdb.org/t/p/w200${m.poster_path}`
                                }));
                            setLoginMarqueePosters(items);
                        }
                    } catch (err) {
                        console.warn('Marquee TMDB fetch failed, using fallback:', err);
                    }
                };

                fetchMarqueePosters();

                return () => { cancelled = true; };
            }, [currentRoute]);

            // --- TRIGGER TOAST ---
            const showToast = (message, type = 'success') => {
                setToast({ visible: true, message, type });
                setTimeout(() => setToast({ visible: false, message: '', type: 'success' }), 3000);
            };

            // --- LOGIN HANDLING ---
            const handleLogin = (e) => {
                if (e) e.preventDefault();
                setLoginError('');

                const found = users.find(u => u.email.toLowerCase() === loginEmail.toLowerCase().trim());
                if (!found) {
                    setLoginError('Usuário não encontrado. Verifique seu e-mail.');
                    return;
                }

                if (found.password !== loginPassword) {
                    setLoginError('Senha incorreta.');
                    return;
                }

                setCurrentUser(found);
                localStorage.setItem('ap_currentUser', JSON.stringify(found));
                if (found.role === 'admin') {
                    setCurrentRoute('admin');
                    showToast('Olá Almeida, painel administrativo desbloqueado!', 'success');
                } else {
                    setCurrentRoute('hub');
                    showToast(`Bem-vindo de volta, ${found.name}!`, 'success');
                }
            };

            const getMovieProvider = (movie) => {
                if (!movie) return null;

                // Verificar se tem providerId específico
                if (movie.providerId) {
                    const p = platforms.find(x => x.id === movie.providerId);
                    if (p) return p;
                }

                // Se um streaming específico está selecionado (não é 'all'), retorna esse provedor filtrado
                if (activePlatformId !== 'all' && activePlatformId) {
                    const selectedPlatform = platforms.find(p => p.id === activePlatformId);
                    if (selectedPlatform && selectedPlatform.enabled) {
                        return selectedPlatform;
                    }
                }

                // Verificar em FALLBACK_MOVIES
                for (const [providerId, list] of Object.entries(FALLBACK_MOVIES)) {
                    if (list.some(m => m.id === movie.id || m.title === movie.title)) {
                        const p = platforms.find(x => x.id === providerId);
                        if (p && (activePlatformId === 'all' || p.id === activePlatformId)) {
                            return p;
                        }
                    }
                }

                // Fallback: Se 'Todos os canais' está selecionado, distribui aleatoriamente
                if (activePlatformId === 'all') {
                    const permittedPlatforms = currentUser
                        ? (currentUser.role === 'admin'
                            ? platforms.filter(p => p.enabled)
                            : platforms.filter(p => p.enabled && currentUser.platforms.includes(p.id)))
                        : [];
                    if (permittedPlatforms.length > 0) {
                        const index = Math.abs(movie.id) % permittedPlatforms.length;
                        return permittedPlatforms[index];
                    }
                }

                return null;
            };

            // --- ADMIN ACTIONS ---
            const handleTogglePermission = async (userId, platformId) => {
                const userToUpdate = users.find(u => u.id === userId);
                if (!userToUpdate) return;
                const hasPlat = userToUpdate.platforms.includes(platformId);
                const updatedPlats = hasPlat
                    ? userToUpdate.platforms.filter(id => id !== platformId)
                    : [...userToUpdate.platforms, platformId];

                setUsers(prev => prev.map(u => u.id === userId ? { ...u, platforms: updatedPlats } : u));
                if (window.supabase) await window.supabase.updateUser(userId, { platforms: updatedPlats });

                setTimeout(() => {
                    setPlatforms(prev => prev.map(p => {
                        const count = users.filter(u => u.role !== 'admin' && u.platforms.includes(p.id)).length + 1;
                        if (p.occupied_slots !== count) {
                            if (window.supabase) window.supabase.updatePlatform(p.id, { occupied_slots: count });
                        }
                        return { ...p, occupied_slots: count, occupiedSlots: count };
                    }));
                }, 50);

                showToast('Permissões do usuário atualizadas no Banco!', 'success');
            };

            const handleAddUser = async (e) => {
                e.preventDefault();
                if (!newUserName || !newUserEmail || !newUserPassword) {
                    showToast('Preencha todos os campos do usuário.', 'error');
                    return;
                }

                if (users.some(u => u.email.toLowerCase() === newUserEmail.toLowerCase().trim())) {
                    showToast('Este e-mail já está cadastrado.', 'error');
                    return;
                }

                const newUser = {
                    name: newUserName,
                    email: newUserEmail.toLowerCase().trim(),
                    password: newUserPassword,
                    role: 'user',
                    active: true,
                    platforms: [],
                    is_first_login: true
                };

                if (window.supabase) {
                    const created = await window.supabase.createUser(newUser);
                    if (created) {
                        setUsers(prev => [...prev, created]);
                    } else {
                        showToast('Erro ao criar no banco.', 'error');
                        return;
                    }
                } else {
                    newUser.id = Date.now().toString(); // local fallback
                    setUsers(prev => [...prev, newUser]);
                }

                setNewUserName('');
                setNewUserEmail('');
                setNewUserPassword('');
                showToast('Amigo cadastrado com sucesso!', 'success');
            };

            const handleDeleteUser = async (userId) => {
                const userToDelete = users.find(u => u.id === userId);
                if (userToDelete && userToDelete.email === 'allmeiids@gmail.com') {
                    showToast('Você não pode deletar a conta Admin.', 'error');
                    return;
                }
                if (confirm('Deseja realmente remover este usuário do banco?')) {
                    if (window.supabase) await window.supabase.request('DELETE', `users?id=eq.${userId}`);
                    setUsers(prev => prev.filter(u => u.id !== userId));
                    showToast('Usuário removido.', 'success');
                }
            };

            const handleAddPlatform = async (e) => {
                e.preventDefault();
                if (!newPlatformName || !newPlatformTMDbId) {
                    showToast('Preencha pelo menos Nome e ID do TMDB.', 'error');
                    return;
                }

                if (platforms.some(p => p.id === newPlatformTMDbId)) {
                    showToast('Este provedor já está cadastrado.', 'error');
                    return;
                }

                const newPlat = {
                    id: newPlatformTMDbId,
                    name: newPlatformName,
                    color: 'from-blue-600 to-sky-900',
                    hover_color: 'hover:border-blue-400',
                    logo: newPlatformLogo,
                    url: newPlatformUrl || 'https://google.com',
                    total_slots: parseInt(newPlatformSlots),
                    occupied_slots: 1,
                    price: 0,
                    enabled: true,
                    email: newPlatformEmail,
                    password: newPlatformPassword
                };

                if (window.supabase) {
                    await window.supabase.addPlatform(newPlat);
                }
                setPlatforms(prev => [...prev, { ...newPlat, hoverColor: newPlat.hover_color, totalSlots: newPlat.total_slots, occupiedSlots: newPlat.occupied_slots }]);

                setNewPlatformName('');
                setNewPlatformTMDbId('');
                setNewPlatformSlots(4);
                setNewPlatformUrl('');
                setNewPlatformLogo('');
                setNewPlatformEmail('');
                setNewPlatformPassword('');
                showToast(`Streaming ${newPlatformName} adicionado!`, 'success');
            };

            const handleRemovePlatform = async (platId) => {
                if (confirm('Deseja realmente remover esta plataforma do banco?')) {
                    if (window.supabase) await window.supabase.request('DELETE', `platforms?id=eq.${platId}`);
                    setPlatforms(prev => prev.filter(p => p.id !== platId));
                    setUsers(prev => prev.map(u => ({
                        ...u,
                        platforms: u.platforms.filter(id => id !== platId)
                    })));
                    showToast('Plataforma removida.', 'success');
                }
            };

            const handleTogglePlatformStatus = async (platId) => {
                const plat = platforms.find(p => p.id === platId);
                if (!plat) return;
                const nextState = !plat.enabled;

                setPlatforms(prev => prev.map(p => p.id === platId ? { ...p, enabled: nextState } : p));
                if (window.supabase) await window.supabase.updatePlatform(platId, { enabled: nextState });
                showToast(`Plataforma ${plat.name} ${nextState ? 'Ativada' : 'Desativada'}!`, 'success');
            };

            const handleAdjustOccupied = async (id, delta) => {
                const plat = platforms.find(p => p.id === id);
                if (!plat) return;
                const total = plat.totalSlots || plat.total_slots || 4;
                const current = plat.occupiedSlots !== undefined ? plat.occupiedSlots : plat.occupied_slots;
                const newVal = Math.max(0, Math.min(current + delta, total));

                setPlatforms(prev => prev.map(p => p.id === id ? { ...p, occupied_slots: newVal, occupiedSlots: newVal } : p));
                if (window.supabase) await window.supabase.updatePlatform(id, { occupied_slots: newVal });
            };

            const handleAdjustTotal = async (id, delta) => {
                const plat = platforms.find(p => p.id === id);
                if (!plat) return;
                const total = plat.totalSlots || plat.total_slots || 4;
                const current = plat.occupiedSlots !== undefined ? plat.occupiedSlots : plat.occupied_slots;
                const newVal = Math.max(1, total + delta);
                const clampedOccupied = Math.min(current, newVal);

                setPlatforms(prev => prev.map(p => p.id === id ? { ...p, total_slots: newVal, totalSlots: newVal, occupied_slots: clampedOccupied, occupiedSlots: clampedOccupied } : p));
                if (window.supabase) await window.supabase.updatePlatform(id, { total_slots: newVal, occupied_slots: clampedOccupied });
            };

            const handleUpdateUrl = async (id, url) => {
                setPlatforms(prev => prev.map(p => p.id === id ? { ...p, url } : p));
                if (window.supabase) await window.supabase.updatePlatform(id, { url });
            };

            const handleUpdatePlatformField = async (id, field, value) => {
                setPlatforms(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
                if (window.supabase) {
                    const dbField = field === 'hoverColor' ? 'hover_color' : (field === 'totalSlots' ? 'total_slots' : (field === 'occupiedSlots' ? 'occupied_slots' : field));
                    await window.supabase.updatePlatform(id, { [dbField]: value });
                }
            };

            const copyText = (text, successMessage = 'Copiado para a area de transferencia.') => {
                if (!text) {
                    showToast('Nada para copiar.', 'error');
                    return;
                }
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text)
                        .then(() => showToast(successMessage, 'success'))
                        .catch(() => showToast('Nao foi possivel copiar automaticamente.', 'error'));
                } else {
                    showToast('Copie manualmente: navegador sem clipboard seguro.', 'error');
                }
            };

            const handleWatchMovie = (movie, closeModal = false) => {
                const provider = getMovieProvider(movie);
                setIsPlaying(true);

                if (provider && provider.email && provider.password) {
                    copyText(provider.password, 'Canal aberto. Senha copiada.');
                    setActiveCredentialsToast({
                        email: provider.email,
                        password: provider.password,
                        platform: provider.name
                    });
                    setTimeout(() => setActiveCredentialsToast(null), 7000);
                } else {
                    showToast('Canal aberto em nova aba.', 'success');
                }

                if (closeModal) setSelectedMovie(null);
            };

            // Finance widgets removed for compliance and simplicity

            // Calculate movies inside the user's favorites list
            const myListMovies = [...moviesTrending, ...moviesPopular, ...moviesAction, ...moviesSciFi, ...moviesComedy, ...moviesDrama, ...moviesFamily, ...moviesHorror]
                .filter((m, index, self) => self.findIndex(t => t.id === m.id) === index)
                .filter(m => myList.includes(m.id));

            const accessiblePlatforms = currentUser
                ? (currentUser.role === 'admin'
                    ? platforms.filter(p => p.enabled)
                    : platforms.filter(p => p.enabled && currentUser.platforms.includes(p.id)))
                : [];

            const catalogSections = [
                { title: 'Destaques em Alta', moviesList: moviesTrending },
                { title: 'Populares no Canal', moviesList: moviesPopular },
                { title: 'Acao e Adrenalina', moviesList: moviesAction },
                { title: 'Ficcao Cientifica e Fantasia', moviesList: moviesSciFi },
                { title: 'Comedias para Relaxar', moviesList: moviesComedy },
                { title: 'Dramas Premiados', moviesList: moviesDrama },
                { title: 'Familia e Animacao', moviesList: moviesFamily },
                { title: 'Suspense e Terror', moviesList: moviesHorror }
            ];

            return (
                <div className="min-h-screen bg-brandDark text-slate-100 flex flex-col antialiased">

                    {/* Simulated Toast System */}
                    {toast.visible && (
                        <div className="fixed top-8 right-8 z-[999] flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl transition-all duration-300 transform translate-y-0 scale-100 glass-panel border-l-4 border-l-brandAccent border border-white/10 animate-float">
                            <span className={`w-3 h-3 rounded-full ${toast.type === 'success' ? 'bg-brandEmerald animate-ping' : 'bg-brandRose animate-ping'}`} />
                            <p className="text-sm font-semibold text-white/95">{toast.message}</p>
                        </div>
                    )}

                    {/* Credentials Copy Toast */}
                    {activeCredentialsToast && (
                        <div className="fixed top-24 right-4 sm:right-8 z-[999] w-[calc(100vw-2rem)] max-w-sm p-4 rounded-xl shadow-2xl glass-panel border border-brandViolet/20 bg-brandViolet/5 backdrop-blur-xl animate-float">
                            <div className="flex items-center gap-2 mb-3">
                                <Icon name="key" className="w-4 h-4 text-brandViolet" />
                                <h4 className="font-bold text-sm text-brandViolet uppercase tracking-wider">{activeCredentialsToast.platform}</h4>
                            </div>
                            <div className="space-y-2.5 bg-black/40 rounded-lg p-3 mb-3 border border-white/5">
                                <div>
                                    <p className="text-[10px] text-slate-500 font-semibold mb-1">Email</p>
                                    <p className="text-xs text-white font-mono break-all">{activeCredentialsToast.email}</p>
                                </div>
                                <div className="h-[1px] bg-white/10" />
                                <div>
                                    <p className="text-[10px] text-slate-500 font-semibold mb-1">Senha</p>
                                    <p className="text-xs text-white font-mono">{activeCredentialsToast.password}</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button
                                    type="button"
                                    onClick={() => copyText(activeCredentialsToast.password, 'Senha copiada novamente.')}
                                    className="flex-1 py-2 rounded-lg bg-brandViolet/20 text-brandViolet border border-brandViolet/25 text-[10px] font-extrabold uppercase tracking-wider hover:bg-brandViolet/30 transition"
                                >
                                    Copiar Senha
                                </button>
                                <button
                                    type="button"
                                    onClick={() => setActiveCredentialsToast(null)}
                                    className="px-3 py-2 rounded-lg bg-white/5 text-slate-300 border border-white/10 text-[10px] font-bold hover:bg-white/10 transition"
                                >
                                    Fechar
                                </button>
                            </div>
                            <p className="text-[10px] text-slate-400 text-center mt-3">Se o streaming pedir login, use o email acima e cole a senha.</p>
                        </div>
                    )}

                    {/* ======================================================== */}
                    {/*             1. CINEMATIC LOGIN EXPERIENCE                */}
                    {/* ======================================================== */}
                    {currentRoute === 'login' && (
                        <div className="relative min-h-screen w-full overflow-hidden flex flex-col bg-black">

                            {/* === CAMADA 1: CATÁLOGO ANIMADO (fundo) === */}
                            <div className="absolute inset-0 z-0 opacity-40 select-none pointer-events-none">
                                <div
                                    className="absolute inset-0 z-10"
                                    style={{
                                        background: 'linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 30%, rgba(0,0,0,0.3) 70%, rgba(0,0,0,0.9) 100%)'
                                    }}
                                />
                                <div className="flex flex-col gap-1 py-2 catalog-fade-mask" style={{ minHeight: '100vh' }}>
                                    {loginMarqueeRows.map((row, rowIndex) => (
                                        <div key={rowIndex} className="overflow-hidden">
                                            <div className={rowIndex % 2 === 0 ? 'animate-marquee-left' : 'animate-marquee-right'}>
                                                {row.map((movie, i) => (
                                                    <div
                                                        key={`${movie.id}-${i}`}
                                                        className="flex-shrink-0 w-[110px] h-[158px] rounded-[3px] overflow-hidden poster-card"
                                                        style={{ boxShadow: '0 8px 24px rgba(0,0,0,0.6)' }}
                                                    >
                                                        <img
                                                            src={movie.poster_path}
                                                            alt=""
                                                            className="w-full h-full object-cover"
                                                            loading="eager"
                                                            crossOrigin="anonymous"
                                                            onError={e => { e.target.style.display = 'none'; }}
                                                            draggable="false"
                                                        />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* === CAMADA 2: OVERLAY GRADIENTE CENTRAL === */}
                            <div
                                className="absolute inset-0 z-10 pointer-events-none"
                                style={{
                                    background: 'linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.55) 50%, rgba(0,0,0,0.85) 100%)'
                                }}
                            />

                            {/* === CAMADA 3: CONTEÚDO (logo + headline + form) === */}
                            <div className="relative z-20 flex flex-col min-h-screen">

                                {/* NAVBAR: Logo topo esquerdo */}
                                <div className="flex items-center justify-between px-6 md:px-12 py-5">
                                    <div className="flex items-center gap-0.5 select-none">
                                        <span
                                            className="font-black tracking-tighter leading-none"
                                            style={{
                                                fontFamily: 'Outfit, sans-serif',

                                            {/* Content Details */}
                                            <div className="p-6 space-y-4">
                                                <div className="flex justify-between items-center text-xs text-slate-400 font-semibold border-b border-white/5 pb-3">
                                                    <span>Lançamento: {selectedMovie.release_date || '2024'}</span>
                                                    <span>Idioma Original: {selectedMovie.original_language?.toUpperCase() || 'PT'}</span>
                                                </div>

                                                <div className="space-y-2">
                                                    <h4 className="text-xs font-bold text-slate-300 uppercase tracking-widest">Sinopse</h4>
                                                    <p className="text-xs text-slate-400 leading-relaxed font-medium">
                                                        {selectedMovie.overview || 'Sinopse oficial indisponível. Explore e assista ao título direto na plataforma correspondente para conferir todos os detalhes.'}
                                                    </p>
                                                </div>

                                                {/* Actions Row */}
                                                <div className="flex items-center gap-3 pt-4 border-t border-white/5 flex-wrap">
                                                    <a
                                                        href={getMovieProvider(selectedMovie)?.url || 'https://google.com'}
                                                        target="_blank"
                                                        rel="noreferrer"
                                                        onClick={() => {
                                                            handleWatchMovie(selectedMovie, true);
                                                        }}
                                                        className="flex-1 min-w-[150px] py-3 rounded-xl bg-brandAccent hover:bg-brandAccent/90 font-bold text-xs text-white tracking-wider flex items-center justify-center gap-2 shadow-lg hover:shadow-neon-blue transition"
                                                    >
                                                        <Icon name="play" className="w-4 h-4 fill-current" />
                                                        <span>ASSISTIR NO CANAL</span>
                                                    </a>

                                                    {/* Credentials Copy Button */}
                                                    <button
                                                        onClick={() => {
                                                            const provider = getMovieProvider(selectedMovie);
                                                            if (provider && provider.email && provider.password) {
                                                                copyText(provider.password, 'Senha copiada.');
                                                                setActiveCredentialsToast({
                                                                    email: provider.email,
                                                                    password: provider.password,
                                                                    platform: provider.name
                                                                });
                                                                setTimeout(() => setActiveCredentialsToast(null), 7000);
                                                            } else {
                                                                showToast('Credencial ainda nao cadastrada no admin.', 'error');
                                                            }
                                                        }}
                                                        className="px-5 py-3 rounded-xl bg-brandViolet/15 hover:bg-brandViolet/25 text-brandViolet font-bold text-xs border border-brandViolet/20 flex items-center gap-2 transition"
                                                        title="Copiar senha da plataforma"
                                                    >
                                                        <Icon name="copy" className="w-4 h-4" />
                                                        <span className="hidden sm:inline">COPIAR SENHA</span>
                                                    </button>

                                                    <button
                                                        onClick={() => {
                                                            const isStarred = myList.includes(selectedMovie.id);
                                                            if (isStarred) {
                                                                setMyList(prev => prev.filter(id => id !== selectedMovie.id));
                                                                if (window.supabase) window.supabase.removeFavorite(currentUser.id, selectedMovie.id);
                                                                showToast('Removido da sua lista', 'info');
                                                            } else {
                                                                setMyList(prev => [...prev, selectedMovie.id]);
                                                                if (window.supabase) window.supabase.addFavorite(currentUser.id, selectedMovie.id, selectedMovie.title);
                                                                showToast('Salvo na sua lista!', 'success');
                                                            }
                                                        }}
                                                        className="px-5 py-3 rounded-xl bg-white/5 hover:bg-white/10 text-white font-bold text-xs border border-white/10 flex items-center gap-2 transition"
                                                    >
                                                        {myList.includes(selectedMovie.id) ? (
                                                            <>
                                                                <Icon name="check" className="w-4 h-4 text-brandEmerald" />
                                                                <span>SALVO</span>
                                                            </>
                                                        ) : (
                                                            <>
                                                                <Icon name="plus" className="w-4 h-4" />
                                                                <span>MINHA LISTA</span>
                                                            </>
                                                        )}
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* --- SETTINGS SECTION --- */}
                                {currentRoute === 'settings' && (
                                    <div className="animate-float-up p-4 lg:p-8 space-y-8 pb-24">
                                        <header className="mb-6">
                                            <h2 className="text-2xl font-black text-white">Configurações de Perfil</h2>
                                            <p className="text-slate-400 text-sm mt-1">Atualize sua foto ou mude sua senha.</p>
                                        </header>

                                        <div className="glass-panel rounded-2xl p-6 lg:p-8 space-y-8 max-w-2xl mx-auto lg:mx-0">

                                            {/* Avatar Settings */}
                                            <div className="space-y-4">
                                                <h3 className="text-sm font-bold text-white uppercase tracking-wider">Sua Foto</h3>
                                                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-6">
                                                    <div className="relative shrink-0">
                                                        {settingsAvatarUrl ? (
                                                            settingsAvatarUrl === 'NONE' ? (
                                                                <div className="w-24 h-24 rounded-2xl bg-gradient-to-br from-brandAccent/25 to-brandViolet/25 border-2 border-brandAccent/15 text-white flex items-center justify-center font-black uppercase text-3xl">
                                                                    {currentUser.name.substring(0, 2).toUpperCase()}
                                                                </div>
                                                            ) : (
                                                                <img src={settingsAvatarUrl} alt="Preview" className="w-24 h-24 rounded-2xl object-cover border-2 border-white/10" />
                                                            )
                                                        ) : (
                                                            renderUserAvatar(currentUser, "w-24 h-24 rounded-2xl text-2xl")
                                                        )}
                                                    </div>

                                                    <div className="space-y-3 flex-1 w-full">
                                                        <div className="relative group cursor-pointer w-full">
                                                            <input
                                                                type="file"
                                                                accept="image/*"
                                                                onChange={(e) => {
                                                                    const file = e.target.files[0];
                                                                    if (!file) return;
                                                                    const reader = new FileReader();
                                                                    reader.onload = (ev) => {
                                                                        const img = new Image();
                                                                        img.onload = () => {
                                                                            const canvas = document.createElement('canvas');
                                                                            const MAX_SIZE = 256;
                                                                            let width = img.width;
                                                                            let height = img.height;
                                                                            if (width > height) {
                                                                                if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                                                                            } else {
                                                                                if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                                                                            }
                                                                            canvas.width = width;
                                                                            canvas.height = height;
                                                                            const ctx = canvas.getContext('2d');
                                                                            ctx.drawImage(img, 0, 0, width, height);
                                                                            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                                                                            setSettingsAvatarUrl(dataUrl);
                                                                        };
                                                                        img.src = ev.target.result;
                                                                    };
                                                                    reader.readAsDataURL(file);
                                                                }}
                                                                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                                                            />
                                                            <div className="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/10 border-dashed text-white text-sm flex items-center justify-center gap-2 group-hover:border-brandAccent transition-all">
                                                                <Icon name="user" className="w-5 h-5 text-slate-400 group-hover:text-brandAccent" />
                                                                <span>Escolher nova foto...</span>
                                                            </div>
                                                        </div>

                                                        <button
                                                            onClick={() => setSettingsAvatarUrl('NONE')}
                                                            className="text-xs text-brandRose hover:text-red-400 font-semibold transition"
                                                        >
                                                            Remover Foto Atual
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="h-[1px] bg-white/10"></div>

                                            {/* Password Settings */}
                                            <div className="space-y-4">
                                                <h3 className="text-sm font-bold text-white uppercase tracking-wider">Segurança</h3>
                                                <div className="space-y-2">
                                                    <label className="text-xs text-slate-400 font-medium ml-1">Nova Senha (opcional)</label>
                                                    <input
                                                        type="password"
                                                        value={settingsPassword}
                                                        onChange={e => setSettingsPassword(e.target.value)}
                                                        placeholder="Deixe em branco para não alterar"
                                                        className="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/10 text-white placeholder-slate-600 focus:outline-none focus:border-brandAccent transition-all"
                                                    />
                                                </div>
                                            </div>

                                            <div className="pt-4 flex justify-end">
                                                <button
                                                    disabled={isSavingSettings}
                                                    onClick={async () => {
                                                        setIsSavingSettings(true);
                                                        try {
                                                            const updates = {};
                                                            if (settingsAvatarUrl === 'NONE') {
                                                                updates.avatar = null;
                                                            } else if (settingsAvatarUrl) {
                                                                updates.avatar = settingsAvatarUrl;
                                                            }

                                                            if (settingsPassword && settingsPassword.length >= 4) {
                                                                updates.password = settingsPassword;
                                                            } else if (settingsPassword && settingsPassword.length > 0) {
                                                                showToast('A senha precisa ter pelo menos 4 caracteres.', 'error');
                                                                setIsSavingSettings(false);
                                                                return;
                                                            }

                                                            if (Object.keys(updates).length > 0 && window.supabase) {
                                                                const res = await window.supabase.updateUser(currentUser.id, updates);
                                                                if (res) {
                                                                    setCurrentUser(res);
                                                                    localStorage.setItem('ap_currentUser', JSON.stringify(res));
                                                                    const updatedUsers = users.map(u => u.id === res.id ? res : u);
                                                                    setUsers(updatedUsers);
                                                                    localStorage.setItem('ap_users', JSON.stringify(updatedUsers));
                                                                    showToast('Configurações salvas com sucesso!', 'success');
                                                                    setSettingsPassword('');
                                                                    setSettingsAvatarUrl('');
                                                                } else {
                                                                    showToast('Erro ao salvar.', 'error');
                                                                }
                                                            } else {
                                                                showToast('Nenhuma alteração para salvar.', 'info');
                                                            }
                                                        } catch (e) {
                                                            showToast('Erro de comunicação', 'error');
                                                        }
                                                        setIsSavingSettings(false);
                                                    }}
                                                    className={`px-6 py-3 rounded-xl font-bold text-sm shadow-neon-blue transition-all ${isSavingSettings ? 'bg-brandAccent/50 text-white/50 cursor-not-allowed' : 'bg-brandAccent text-white hover:bg-blue-500'}`}
                                                >
                                                    {isSavingSettings ? 'Salvando...' : 'Salvar Alterações'}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Mobile Bottom Navigation */}
                            <nav className="lg:hidden fixed bottom-0 left-0 right-0 bg-[#050B14]/95 backdrop-blur-xl border-t border-white/10 z-50 px-2 py-3 flex justify-around items-center shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                                {currentUser.role === 'admin' && (
                                    <button onClick={() => setCurrentRoute('admin')} className={`flex flex-col items-center gap-1 ${currentRoute === 'admin' ? 'text-brandViolet' : 'text-slate-500'}`}>
                                        <Icon name="settings" className="w-5 h-5" />
                                        <span className="text-[9px] font-bold">Admin</span>
                                    </button>
                                )}
                                <button onClick={() => setCurrentRoute('hub')} className={`flex flex-col items-center gap-1 ${currentRoute === 'hub' ? 'text-brandAccent' : 'text-slate-500'}`}>
                                    <Icon name="home" className="w-5 h-5" />
                                    <span className="text-[9px] font-bold">Início</span>
                                </button>
                                <button onClick={() => setCurrentRoute('acessos')} className={`flex flex-col items-center gap-1 ${currentRoute === 'acessos' ? 'text-brandViolet' : 'text-slate-500'}`}>
                                    <Icon name="key" className="w-5 h-5" />
                                    <span className="text-[9px] font-bold">Acessos</span>
                                </button>
                                <button onClick={() => setCurrentRoute('financeiro')} className={`flex flex-col items-center gap-1 ${currentRoute === 'financeiro' ? 'text-brandRose' : 'text-slate-500'}`}>
                                    <Icon name="support" className="w-5 h-5" />
                                    <span className="text-[9px] font-bold">PIX</span>
                                </button>
                                <button onClick={() => setCurrentRoute('settings')} className={`flex flex-col items-center gap-1 ${currentRoute === 'settings' ? 'text-brandEmerald' : 'text-slate-500'}`}>
                                    <Icon name="user" className="w-5 h-5" />
                                    <span className="text-[9px] font-bold">Perfil</span>
                                </button>
                            </nav>

                            {/* --- FOOTER MOVIDO PARA O MENU --- */}
                        </div>
                    )}

                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
