<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>ALMEIDA+</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- React & ReactDOM (UMD Production) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase Client -->
    <script src="./supabase-client.js"></script>

    <!-- QRCode.js -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brandDark: '#080A0F',
                        brandCard: 'rgba(12, 12, 15, 0.85)',
                        brandBorder: 'rgba(255, 255, 255, 0.07)',
                        brandAccent: '#E54711',
                        brandViolet: '#E54711',
                        brandEmerald: '#10B981',
                        brandRose: '#F43F5E',
                    },
                    boxShadow: {
                        'neon-blue': '0 0 25px rgba(229, 71, 17, 0.25)',
                        'neon-violet': '0 0 25px rgba(229, 71, 17, 0.2)',
                        'neon-glow': '0 0 35px rgba(229, 71, 17, 0.2)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 5s ease-in-out infinite',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            /* Altere a cor do texto ALMEIDA aqui (ex: white, #FF0000) */
            --logo-text-color: #E7E8E8;
            /* Altere a cor do + aqui (ex: #3B82F6, red) */
            --logo-plus-color: #E54711;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        @keyframes marquee-left {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        @keyframes marquee-right {
            0% {
                transform: translateX(-50%);
            }

            100% {
                transform: translateX(0);
            }
        }

        .animate-marquee-left {
            display: flex;
            width: max-content;
            gap: 16px;
            animation: marquee-left 45s linear infinite;
            will-change: transform;
        }

        .animate-marquee-right {
            display: flex;
            width: max-content;
            gap: 16px;
            animation: marquee-right 45s linear infinite;
            will-change: transform;
        }

        .login-poster-strip {
            width: max-content;
            min-width: 220vw;
        }

        .catalog-fade-mask {
            mask-image: linear-gradient(90deg, transparent 0%, black 5%, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 5%, black 95%, transparent 100%);
        }

        .poster-card {
            background: linear-gradient(135deg, rgba(229, 71, 17, 0.15), rgba(229, 71, 17, 0.08));
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        }

        @media (prefers-reduced-motion: reduce) {

            .animate-marquee-left,
            .animate-marquee-right,
            .animate-float,
            .animate-pulse,
            .animate-ping {
                animation: none !important;
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(11, 15, 25, 0.5);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(229,71,17,0.35); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(229,71,17,0.6); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .route-fade {
            animation: fadeIn 0.22s ease-out both;
        }

        body {
            background-color: #080A0F;
            background-attachment: fixed;
            color: #E2E8F0;
            overflow-x: hidden;
            font-family: 'Outfit', sans-serif;
        }

        .glass-panel {
            background: rgba(10, 10, 13, 0.80);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        /* Custom iOS Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .3s;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #10B981;
        }

        input:checked+.slider:before {
            transform: translateX(16px);
        }

        /* === MOBILE APP FOUNDATION === */
        html, body { overscroll-behavior: none; -webkit-overflow-scrolling: touch; touch-action: pan-y; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 16px); }
        .safe-top { padding-top: env(safe-area-inset-top, 0px); }
        .bottom-nav-safe { padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); }
        .scroll-snap-x { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .scroll-snap-x::-webkit-scrollbar { display: none; }
        .scroll-snap-x > * { scroll-snap-align: start; }
        * { -webkit-tap-highlight-color: transparent; }
        button:active, a:active { opacity: 0.75; transform: scale(0.97); transition: transform 0.08s, opacity 0.08s; }
        .catalog-row { -ms-overflow-style: none; scrollbar-width: none; }
        .catalog-row::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="bg-brandDark">

    <div id="root">
        <div id="app-loading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0B0F19;flex-direction:column;gap:16px;font-family:Outfit,sans-serif">
            <div style="display:flex;align-items:center;gap:2px;font-size:2rem;font-weight:900;letter-spacing:-0.03em;user-select:none">
                <span style="color:#E8E8E8">ALMEIDA</span>
                <span style="color:#E54711">+</span>
            </div>
            <div style="width:120px;height:3px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden">
                <div style="width:30%;height:100%;background:#E54711;border-radius:4px;animation:loading-bar 1.2s ease-in-out infinite"></div>
            </div>
            <style>@keyframes loading-bar{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}</style>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuration (TMDB keys are server-side only, set in Vercel env vars)
        const REGION = 'BR';
        const LANG = 'pt-BR';

        const API_PROXY = '/api';

        // TMDB helper — routes through Vercel proxy (keys are server-side only)
        const tmdbFetch = async (endpoint, params = {}) => {
            const response = await fetch(`${API_PROXY}/tmdb`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ endpoint, params: { ...params, language: LANG, region: REGION } })
            });
            if (!response.ok) throw new Error('TMDB request failed');
            return response.json();
        };

        // BrandLogo Vector component for safe premium visualization
        const BrandLogo = ({ name, className = "w-6 h-6" }) => {
            const lower = name.toLowerCase();
            if (lower.includes("netflix")) {
                return (
                    <svg viewBox="0 0 24 24" className={className} fill="#E50914" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 2v20c1.333-.333 2.667-.667 4-1V2C6.667 2.333 5.333 2.667 4 2zm12 0c-1.333.333-2.667.667-4 1v19c1.333-.333 2.667-.667 4-1V2zm-4 4.5L8 18.5V22l4-3V6.5z" />
                    </svg>
                );
            }
            if (lower.includes("prime") || lower.includes("amazon")) {
                return (
                    <svg viewBox="0 0 24 24" className={className} fill="#00A8E1" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1.8 14.8c-2.4 0-3.6-1.2-3.6-3.2 0-2.4 1.8-3.3 4.2-3.3.7 0 1.3.1 1.8.2v-.4c0-.9-.5-1.5-1.7-1.5-.9 0-1.7.3-2.4.8l-.6-1.1c1-.8 2.4-1.2 3.8-1.2 2.3 0 3.5 1.1 3.5 3.3v4.3c0 .8.3 1.2.6 1.5l-1.3.9c-.3-.3-.4-.7-.4-1.1-.5.9-1.5 1.5-2.9 1.5zm1.7-4.3v-.9c-.4-.1-.8-.1-1.2-.1-1.4 0-2.2.4-2.2 1.6 0 .9.5 1.4 1.4 1.4 1.1-.1 2-1 2-2z" />
                    </svg>
                );
            }
            if (lower.includes("disney")) {
                return (
                    <svg viewBox="0 0 24 24" className={className} fill="#3B82F6" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z" />
                    </svg>
                );
            }
            if (lower.includes("globoplay")) {
                return (
                    <svg viewBox="0 0 24 24" className={className} xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" fill="url(#globoplayGrad)" />
                        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8.5c-1.93 0-3.5-1.57-3.5-3.5S10.07 8.5 12 8.5 15.5 10.07 15.5 12 13.93 15.5 12 15.5z" fill="#FFF" />
                        <defs>
                            <linearGradient id="globoplayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stopColor="#FF4A00" />
                                <stop offset="100%" stopColor="#FF007A" />
                            </linearGradient>
                        </defs>
                    </svg>
                );
            }
            if (lower.includes("hbo") || lower.includes("max")) {
                return (
                    <svg viewBox="0 0 24 24" className={className} fill="#8B5CF6" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14h-2v-3H9v3H7v-8h2v3h2v-3h2v8zm5-4c0 2.2-1.8 4-4 4s-4-1.8-4-4 1.8-4 4-4 4 1.8 4 4z" />
                    </svg>
                );
            }
            if (lower.includes("paramount")) {
                return (
                    <svg viewBox="0 0 24 24" className={className} fill="#06B6D4" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5l-4-4 1.4-1.4 2.6 2.6 5.6-5.6 1.4 1.4-7 7z" />
                    </svg>
                );
            }
            if (lower.includes("apple")) {
                return (
                    <svg viewBox="0 0 24 24" className={className} fill="#FFFFFF" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.05-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.1.09 2.23-.57 2.95-1.4" />
                    </svg>
                );
            }
            return (
                <svg viewBox="0 0 24 24" className={className} fill="#3B82F6" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5v14l11-7z" />
                </svg>
            );
        };

        // Safe Avatar Component
        const SafeAvatar = ({ user, sizeClass = "w-12 h-12 rounded-xl" }) => {
            const [hasError, setHasError] = useState(false);

            useEffect(() => {
                setHasError(false);
            }, [user?.avatar, user?.id]);

            const initials = user && user.name ? user.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() : '?';
            const fallbackDiv = (
                <div className={`${sizeClass} bg-gradient-to-br from-brandAccent/20 to-brandAccent/10 border border-brandAccent/20 text-white flex items-center justify-center font-bold text-[11px] shrink-0 uppercase`}>
                    {initials}
                </div>
            );

            if (user && user.avatar && !hasError) {
                return (
                    <img
                        src={user.avatar}
                        alt={user.name}
                        className={`${sizeClass} object-cover border border-white/10 shrink-0 relative z-10`}
                        onError={() => setHasError(true)}
                    />
                );
            }

            return fallbackDiv;
        };

        // Safe Logo Component with image-first rendering and vector fallback
        const SafeLogo = ({ logo, name, className = "w-6 h-6 object-contain" }) => {
            const [hasError, setHasError] = useState(false);

            useEffect(() => {
                setHasError(false);
            }, [logo, name]);

            if (logo && !hasError) {
                return (
                    <img
                        src={logo}
                        alt={name}
                        loading="lazy"
                        className={className}
                        onError={() => setHasError(true)}
                    />
                );
            }

            return <BrandLogo name={name} className={className} />;
        };

        // User Avatar Legacy helper wrapper
        const renderUserAvatar = (user, sizeClass = "w-12 h-12 rounded-xl") => {
            return <SafeAvatar user={user} sizeClass={sizeClass} />;
        };

        // Beautiful SVG icons helper
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                home: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21.75h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21.75h8.25" />
                    </svg>
                ),
                key: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
                    </svg>
                ),
                payments: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" />
                    </svg>
                ),
                profile: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                ),
                support: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z" />
                    </svg>
                ),
                logout: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
                    </svg>
                ),
                lock: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                    </svg>
                ),
                unlock: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M13.5 10.5V6.75a4.5 4.5 0 119 0v3.75M3.75 21.75h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H3.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                    </svg>
                ),
                play: (
                    <svg fill="currentColor" viewBox="0 0 24 24" className={className}>
                        <path d="M8 5v14l11-7z" />
                    </svg>
                ),
                pause: (
                    <svg fill="currentColor" viewBox="0 0 24 24" className={className}>
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                ),
                plus: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                ),
                check: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="3" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                    </svg>
                ),
                info: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 111.083.984l-.04.022-1.083-.984zm.682 3.682a.75.75 0 11-1.06 1.06l-.53-.53a.75.75 0 111.06-1.06l.53.53zm3.136-3.136a.75.75 0 111.06-1.06l.53.53a.75.75 0 11-1.06 1.06l-.53-.53zM12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25z" />
                    </svg>
                ),
                search: (
                    <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                    </svg>
                ),

                                                                            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                                                                            setSettingsAvatarUrl(dataUrl);
                                                                        };
                                                                        img.src = ev.target.result;
                                                                    };
                                                                    reader.readAsDataURL(file);
                                                                }}
                                                                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                                                            />
                                                            <div className="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/10 border-dashed text-white text-sm flex items-center justify-center gap-2 group-hover:border-brandAccent transition-all">
                                                                <Icon name="user" className="w-5 h-5 text-slate-400 group-hover:text-brandAccent" />
                                                                <span>Escolher nova foto...</span>
                                                            </div>
                                                        </div>

                                                        <button
                                                            onClick={() => setSettingsAvatarUrl('NONE')}
                                                            className="text-xs text-brandRose hover:text-red-400 font-semibold transition"
                                                        >
                                                            Remover Foto Atual
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="h-[1px] bg-white/10"></div>

                                            {/* Password Settings */}
                                            <div className="space-y-4">
                                                <h3 className="text-sm font-bold text-white uppercase tracking-wider">Segurança</h3>
                                                <div className="space-y-2">
                                                    <label className="text-xs text-slate-400 font-medium ml-1">Nova Senha (opcional)</label>
                                                    <input
                                                        type="password"
                                                        value={settingsPassword}
                                                        onChange={e => setSettingsPassword(e.target.value)}
                                                        placeholder="Deixe em branco para não alterar"
                                                        className="w-full px-4 py-3 rounded-xl bg-black/40 border border-white/10 text-white placeholder-slate-600 focus:outline-none focus:border-brandAccent transition-all"
                                                    />
                                                </div>
                                            </div>

                                            <div className="pt-4 flex justify-end">
                                                <button
                                                    disabled={isSavingSettings}
                                                    onClick={async () => {
                                                        setIsSavingSettings(true);
                                                        try {
                                                            const updates = {};
                                                            if (settingsAvatarUrl === 'NONE') {
                                                                updates.avatar = null;
                                                            } else if (settingsAvatarUrl) {
                                                                updates.avatar = settingsAvatarUrl;
                                                            }

                                                            if (settingsPassword && settingsPassword.length >= 4) {
                                                                updates.password = settingsPassword;
                                                            } else if (settingsPassword && settingsPassword.length > 0) {
                                                                showToast('A senha precisa ter pelo menos 4 caracteres.', 'error');
                                                                setIsSavingSettings(false);
                                                                return;
                                                            }

                                                            if (Object.keys(updates).length > 0) {
                                                                const updatedUser = { ...currentUser, ...updates };
                                                                if (window.supabase) {
                                                                    const res = await window.supabase.updateUser(currentUser.id, updates);
                                                                    if (res) Object.assign(updatedUser, res);
                                                                }
                                                                setCurrentUser(updatedUser);
                                                                localStorage.setItem('ap_currentUser', JSON.stringify(updatedUser));
                                                                const updatedUsers = users.map(u => u.id === updatedUser.id ? updatedUser : u);
                                                                setUsers(updatedUsers);
                                                                localStorage.setItem('ap_users', JSON.stringify(updatedUsers));
                                                                showToast('Configurações salvas com sucesso!', 'success');
                                                                setSettingsPassword('');
                                                                setSettingsAvatarUrl('');
                                                            } else {
                                                                showToast('Nenhuma alteração para salvar.', 'info');
                                                            }
                                                        } catch (e) {
                                                            showToast('Erro de comunicação', 'error');
                                                        }
                                                        setIsSavingSettings(false);
                                                    }}
                                                    className={`px-6 py-3 rounded-xl font-bold text-sm shadow-neon-blue transition-all ${isSavingSettings ? 'bg-brandAccent/40 text-white/50 cursor-not-allowed' : 'bg-brandAccent text-white hover:brightness-110'}`}
                                                >
                                                    {isSavingSettings ? 'Salvando...' : 'Salvar Alterações'}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* === MOBILE BOTTOM NAVIGATION === */}
                            <nav className="lg:hidden fixed bottom-0 left-0 right-0 z-50" style={{ background: 'rgba(5, 8, 15, 0.97)', backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)', borderTop: '1px solid rgba(255,255,255,0.08)', paddingBottom: 'env(safe-area-inset-bottom, 12px)', boxShadow: '0 -8px 32px rgba(0,0,0,0.6)' }}>
                                <div className="flex justify-around items-center px-2 pt-2 pb-1">
                                    <button onClick={() => setCurrentRoute('hub')} className="flex flex-col items-center gap-1 min-w-[56px] min-h-[44px] justify-center relative">
                                        {currentRoute === 'hub' && <span className="absolute top-0 left-1/2 -translate-x-1/2 w-8 h-0.5 rounded-full bg-brandAccent" />}
                                        <Icon name="home" className={`w-5 h-5 transition-colors ${currentRoute === 'hub' ? 'text-brandAccent' : 'text-slate-500'}`} />
                                        <span className={`text-[9px] font-bold tracking-wide transition-colors ${currentRoute === 'hub' ? 'text-brandAccent' : 'text-slate-600'}`}>INÍCIO</span>
                                    </button>
                                    <button onClick={() => setCurrentRoute('acessos')} className="flex flex-col items-center gap-1 min-w-[56px] min-h-[44px] justify-center relative">
                                        {currentRoute === 'acessos' && <span className="absolute top-0 left-1/2 -translate-x-1/2 w-8 h-0.5 rounded-full bg-brandAccent" />}
                                        <Icon name="key" className={`w-5 h-5 transition-colors ${currentRoute === 'acessos' ? 'text-brandAccent' : 'text-slate-500'}`} />
                                        <span className={`text-[9px] font-bold tracking-wide transition-colors ${currentRoute === 'acessos' ? 'text-brandAccent' : 'text-slate-600'}`}>ACESSOS</span>
                                    </button>
                                    <button onClick={() => setCurrentRoute('financeiro')} className="flex flex-col items-center gap-1 min-w-[56px] min-h-[44px] justify-center relative">
                                        {currentRoute === 'financeiro' && <span className="absolute top-0 left-1/2 -translate-x-1/2 w-8 h-0.5 rounded-full bg-brandRose" />}
                                        <Icon name="payments" className={`w-5 h-5 transition-colors ${currentRoute === 'financeiro' ? 'text-brandRose' : 'text-slate-500'}`} />
                                        <span className={`text-[9px] font-bold tracking-wide transition-colors ${currentRoute === 'financeiro' ? 'text-brandRose' : 'text-slate-600'}`}>PIX</span>
                                    </button>
                                    <button onClick={() => setCurrentRoute('settings')} className="flex flex-col items-center gap-1 min-w-[56px] min-h-[44px] justify-center relative">
                                        {currentRoute === 'settings' && <span className="absolute top-0 left-1/2 -translate-x-1/2 w-8 h-0.5 rounded-full bg-brandEmerald" />}
                                        <Icon name="user" className={`w-5 h-5 transition-colors ${currentRoute === 'settings' ? 'text-brandEmerald' : 'text-slate-500'}`} />
                                        <span className={`text-[9px] font-bold tracking-wide transition-colors ${currentRoute === 'settings' ? 'text-brandEmerald' : 'text-slate-600'}`}>PERFIL</span>
                                    </button>
                                </div>
                            </nav>

                            {/* --- FOOTER MOVIDO PARA O MENU --- */}
                        </div>
                    )}

                    {/* === TRAILER MODAL === */}
                    {trailerModal && (
                        <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4"
                            style={{ background: 'rgba(0,0,0,0.95)', backdropFilter: 'blur(8px)' }}
                            onClick={(e) => { if (e.target === e.currentTarget) setTrailerModal(null); }}
                        >
                            <div className="w-full max-w-4xl flex flex-col gap-0" style={{ background: '#0a0a0d', borderRadius: '16px', overflow: 'hidden', border: '1px solid rgba(255,255,255,0.08)' }}>
                                <div className="flex items-center justify-between px-5 py-4" style={{ borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
                                    <div className="flex flex-col">
                                        <span style={{ fontSize: '11px', color: '#E54711', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.12em' }}>Trailer Oficial</span>
                                        <span style={{ fontSize: '16px', color: '#fff', fontWeight: 800, marginTop: '2px' }}>{trailerModal.movie.title}</span>
                                    </div>
                                    <button onClick={() => setTrailerModal(null)} style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '8px', padding: '8px', color: '#fff', cursor: 'pointer', lineHeight: 0 }}>
                                        <Icon name="x" className="w-5 h-5" />
                                    </button>
                                </div>
                                <div style={{ position: 'relative', paddingBottom: '56.25%', background: '#000' }}>
                                    <iframe src={`https://www.youtube.com/embed/${trailerModal.youtubeKey}?autoplay=1&rel=0&modestbranding=1&color=white`} title={`Trailer - ${trailerModal.movie.title}`} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', border: 'none' }} />
                                </div>
                                <div className="flex items-center justify-between px-5 py-4 gap-4" style={{ borderTop: '1px solid rgba(255,255,255,0.06)' }}>
                                    <p style={{ fontSize: '12px', color: 'rgba(180,180,180,0.7)' }}>Disponível em <span style={{ color: '#fff', fontWeight: 700 }}>{trailerModal.providerName}</span></p>
                                    <div className="flex items-center gap-3">
                                        <button onClick={() => setTrailerModal(null)} style={{ padding: '10px 18px', borderRadius: '8px', background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', color: '#ccc', fontSize: '12px', fontWeight: 700, cursor: 'pointer' }}>Fechar</button>
                                        {trailerModal.providerUrl && (
                                            <button onClick={() => { const p = getMovieProvider(trailerModal.movie); handleWatchOnPlatform(p, trailerModal.providerUrl); }} style={{ padding: '10px 22px', borderRadius: '8px', background: '#E54711', color: '#fff', fontSize: '12px', fontWeight: 800, border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '7px', boxShadow: '0 4px 16px rgba(229,71,17,0.35)' }}>
                                                <Icon name="play" className="w-4 h-4" style={{ fill: 'currentColor' }} />ASSISTIR EM {trailerModal.providerName.toUpperCase()}
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* === CREDENTIALS MODAL (mostra ao clicar "ASSISTIR") === */}
                    {showCredsModal && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4"
                            style={{ background: 'rgba(0,0,0,0.9)', backdropFilter: 'blur(6px)' }}
                            onClick={(e) => { if (e.target === e.currentTarget) setShowCredsModal(null); }}
                        >
                            <div className="w-full max-w-sm flex flex-col gap-0" style={{ background: '#0a0a0d', borderRadius: '16px', overflow: 'hidden', border: '1px solid rgba(255,255,255,0.08)' }}>
                                <div className="flex items-center justify-between px-5 py-4" style={{ borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-lg bg-brandAccent/15 flex items-center justify-center">
                                            <Icon name="key" className="w-4 h-4 text-brandAccent" />
                                        </div>
                                        <div>
                                            <p className="text-[11px] font-bold text-white">{showCredsModal.provider.name}</p>
                                            <p className="text-[9px] text-slate-500 uppercase tracking-wider">Credenciais de Acesso</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowCredsModal(null)} style={{ background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '8px', padding: '6px', color: '#fff', cursor: 'pointer', lineHeight: 0 }}>
                                        <Icon name="x" className="w-4 h-4" />
                                    </button>
                                </div>
                                <div className="p-5 space-y-4">
                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase tracking-wider font-bold block mb-1.5">E-mail</label>
                                        <div className="flex items-center justify-between gap-2 bg-black/40 px-3 py-2.5 rounded-lg border border-white/10">
                                            <span className="text-sm text-white font-mono truncate">{showCredsModal.provider.email}</span>
                                            <button onClick={() => copyText(showCredsModal.provider.email, 'E-mail copiado!')} className="text-slate-400 hover:text-white transition-colors shrink-0">
                                                <Icon name="copy" className="w-4 h-4" />
                                            </button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-slate-500 uppercase tracking-wider font-bold block mb-1.5">Senha</label>
                                        <div className="flex items-center justify-between gap-2 bg-black/40 px-3 py-2.5 rounded-lg border border-white/10">
                                            <span className="text-sm text-white font-mono">{showCredsModal.provider.password}</span>
                                            <button onClick={() => copyText(showCredsModal.provider.password, 'Senha copiada!')} className="text-slate-400 hover:text-white transition-colors shrink-0">
                                                <Icon name="copy" className="w-4 h-4" />
                                            </button>
                                        </div>
                                    </div>
                                    <label className="flex items-center gap-2 cursor-pointer py-1">
                                        <input
                                            type="checkbox"
                                            checked={dontRemindCreds}
                                            onChange={(e) => {
                                                const val = e.target.checked;
                                                setDontRemindCreds(val);
                                                localStorage.setItem('ap_dont_remind_creds', val.toString());
                                            }}
                                            className="w-3.5 h-3.5 rounded border-white/20 bg-black/40 accent-brandAccent"
                                        />
                                        <span className="text-[10px] text-slate-400">Não perguntar novamente</span>
                                    </label>
                                </div>
                                <div className="flex items-center gap-3 px-5 py-4" style={{ borderTop: '1px solid rgba(255,255,255,0.06)' }}>
                                    <button onClick={() => setShowCredsModal(null)} className="flex-1 py-2.5 rounded-xl bg-white/5 border border-white/10 text-slate-300 text-xs font-bold hover:bg-white/10 transition">
                                        Fechar
                                    </button>
                                    <a
                                        href={showCredsModal.returnUrl || '#'}
                                        target="_blank"
                                        rel="noreferrer"
                                        onClick={() => setShowCredsModal(null)}
                                        className="flex-1 py-2.5 rounded-xl bg-brandAccent text-white text-xs font-bold hover:brightness-110 transition text-center flex items-center justify-center gap-2"
                                    >
                                        <Icon name="play" className="w-3.5 h-3.5" />
                                        ABRIR {showCredsModal.provider.name.toUpperCase()}
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
